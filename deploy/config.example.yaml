# Sub2API 自用桌面版配置示例
# 复制到 DATA_DIR/config.yaml（Windows: %APPDATA%/local-sub2api-lite/config.yaml）

run_mode: local

server:
  host: "127.0.0.1"
  port: 8080
  mode: "release"

database:
  driver: sqlite
  sqlite_path: sub2api.db

redis:
  mode: embedded

local:
  default_admin_email: admin@localhost
  # 留空则首次启动随机生成并在桌面欢迎页展示一次
  default_admin_password: ""
  auto_api_key_name: default-local-key

jwt:
  secret: ""  # 首次启动自动写入
  expire_hour: 24

default:
  user_concurrency: 30
  user_balance: 0
  api_key_prefix: "sk-"
  rate_multiplier: 1.0

timezone: Asia/Shanghai

log:
  level: info
  format: console
  stacktrace_level: error
  output:
    to_stdout: true
    to_file: false
  rotation:
    max_size_mb: 100
    max_backups: 3
    max_age_days: 7
    compress: true
  sampling:
    enabled: false
    initial: 100
    thereafter: 100

cors:
  allowed_origins:
    - "http://127.0.0.1:*"
    - "http://localhost:*"
